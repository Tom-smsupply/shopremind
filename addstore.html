<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ShopRemind — Add Store</title>
  <link rel="icon" href="shopremindlogo-192.png" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
  <link rel="stylesheet" href="style.css" />
  <style>
    html, body { height: 100%; overflow: hidden; }
    body { display: flex; flex-direction: column; }
    .page-body { flex: 1; overflow-y: auto; overflow-x: hidden; -webkit-overflow-scrolling: touch; padding-bottom: 2rem; }
  </style>
</head>
<body>

  <header>
    <a class="btn-back" href="index.html">
      <svg width="18" height="18" viewBox="0 0 16 16" fill="none">
        <path d="M10 3L5 8l5 5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </a>
    <span id="page-title" style="font-size:19px;font-weight:700;color:var(--navy);margin-left:4px">Add store</span>
  </header>

  <div class="page-body">

    <div style="padding:1.25rem 1.25rem 0">

      <div class="field">
        <label>Store name</label>
        <input type="text" id="input-name" placeholder="e.g. Costco Orillia, Walmart…" autocomplete="off" />
      </div>

      <div class="field">
        <label>Icon</label>
        <div class="emoji-row" id="emoji-picker">
          <button class="emoji-btn selected" data-emoji="🛒">🛒</button>
          <button class="emoji-btn" data-emoji="🏪">🏪</button>
          <button class="emoji-btn" data-emoji="🥦">🥦</button>
          <button class="emoji-btn" data-emoji="💊">💊</button>
          <button class="emoji-btn" data-emoji="🔧">🔧</button>
          <button class="emoji-btn" data-emoji="👕">👕</button>
          <button class="emoji-btn" data-emoji="📦">📦</button>
          <button class="emoji-btn" data-emoji="🍕">🍕</button>
          <button class="emoji-btn" data-emoji="🐾">🐾</button>
          <button class="emoji-btn" data-emoji="⚽">⚽</button>
        </div>
      </div>

      <div class="field">
        <label>Alert radius — <span id="radius-display" style="color:var(--accent-dk);font-family:'DM Mono',monospace">200 m</span></label>
        <input type="range" id="input-radius" min="50" max="1000" step="50" value="200"
               oninput="document.getElementById('radius-display').textContent = this.value + ' m'" />
      </div>

    </div>

    <div class="section-divider">Store location</div>

    <div class="map-wrap">
      <div id="map"></div>
      <div class="map-hint-overlay" id="map-hint">Tap map to drop a pin</div>
    </div>

    <div style="padding:0.75rem 1.25rem 0">
      <div class="search-wrap">
        <input class="search-input" id="search-input" type="text"
               placeholder="Search store name or address…" autocomplete="off"
               onkeydown="if(event.key==='Enter') doSearch()" />
        <span class="spinner" id="search-spinner"></span>
        <button class="btn-search" onclick="doSearch()">Search</button>
      </div>
      <div class="search-results" id="search-results"></div>

      <button class="btn-gps" onclick="useMyLocation()">
        <svg width="17" height="17" viewBox="0 0 16 16" fill="none">
          <circle cx="8" cy="8" r="3" stroke="currentColor" stroke-width="1.5"/>
          <path d="M8 1v2M8 13v2M1 8h2M13 8h2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
        <span id="gps-label">Use my current location</span>
      </button>
    </div>

    <!-- Selected location -->
    <div id="loc-strip" class="loc-strip" style="margin:0.75rem 1.25rem 0">
      <svg width="15" height="15" viewBox="0 0 16 16" fill="none" style="flex-shrink:0">
        <path d="M8 1.5C5.5 1.5 3.5 3.5 3.5 6C3.5 9.5 8 14.5 8 14.5S12.5 9.5 12.5 6C12.5 3.5 10.5 1.5 8 1.5Z" stroke="currentColor" stroke-width="1.5" fill="none"/>
        <circle cx="8" cy="6" r="1.75" stroke="currentColor" stroke-width="1.5"/>
      </svg>
      <div style="flex:1;min-width:0">
        <div id="loc-name" style="font-size:14px;font-weight:600;color:var(--navy);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">Location set</div>
        <div id="loc-coords" style="font-size:12px;font-family:'DM Mono',monospace;color:var(--accent-dk);margin-top:2px"></div>
      </div>
      <button class="btn-clear-loc" onclick="clearPin()">Clear</button>
    </div>

    <!-- Save -->
    <div style="padding:1.25rem 1.25rem 0">
      <button class="btn-primary" id="btn-save" onclick="saveStore()">Save store</button>
      <p style="text-align:center;font-size:13px;color:var(--muted);margin-top:8px" id="save-hint">Name required · Location optional</p>
    </div>

  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
  <script>
    const params  = new URLSearchParams(location.search);
    const editId  = params.get('id');
    let stores    = JSON.parse(localStorage.getItem('shopremind_stores') || '[]');
    let editStore = editId ? stores.find(s => s.id === editId) : null;

    let selectedEmoji = '🛒';
    let selectedLat = null, selectedLng = null, selectedName = null;
    let marker = null;

    if (editStore) {
      document.getElementById('page-title').textContent = 'Edit store';
      document.getElementById('input-name').value = editStore.name;
      document.getElementById('input-radius').value = editStore.radius || 200;
      document.getElementById('radius-display').textContent = (editStore.radius || 200) + ' m';
      selectedEmoji = editStore.emoji || '🛒';
      selectedLat   = editStore.lat   || null;
      selectedLng   = editStore.lng   || null;
      selectedName  = editStore.locName || null;
      document.querySelectorAll('.emoji-btn').forEach(b => b.classList.toggle('selected', b.dataset.emoji === selectedEmoji));
    }

    document.getElementById('emoji-picker').addEventListener('click', e => {
      const btn = e.target.closest('.emoji-btn');
      if (!btn) return;
      selectedEmoji = btn.dataset.emoji;
      document.querySelectorAll('.emoji-btn').forEach(b => b.classList.toggle('selected', b === btn));
    });

    // Map init
    const map = L.map('map', { center: [selectedLat||44.5, selectedLng||-79.4], zoom: selectedLat ? 16 : 12 });
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>', maxZoom: 19
    }).addTo(map);

    const pinIcon = L.divIcon({
      className: '',
      html: `<div style="width:22px;height:22px;background:#2BC4D4;border-radius:50% 50% 50% 0;transform:rotate(-45deg);border:3px solid #1B2A6B;box-shadow:0 2px 8px rgba(27,42,107,0.4);"></div>`,
      iconSize: [22,22], iconAnchor: [11,22], popupAnchor: [0,-26]
    });

    if (selectedLat) {
      placeMarker(selectedLat, selectedLng, selectedName || 'Saved location');
      showLocStrip(selectedLat, selectedLng, selectedName || 'Saved location');
    }

    map.on('click', async e => {
      const { lat, lng } = e.latlng;
      document.getElementById('map-hint').classList.add('hidden');
      selectedLat = lat; selectedLng = lng; selectedName = null;
      placeMarker(lat, lng, 'Pin dropped');
      showLocStrip(lat, lng, 'Looking up address…');
      const name = await reverseGeocode(lat, lng);
      if (name) { selectedName = name; showLocStrip(lat, lng, name); if (marker) marker.setPopupContent(name).openPopup(); }
    });

    function placeMarker(lat, lng, label) {
      if (marker) map.removeLayer(marker);
      marker = L.marker([lat, lng], { icon: pinIcon, draggable: true }).addTo(map).bindPopup(label).openPopup();
      marker.on('dragend', async () => {
        const p = marker.getLatLng();
        selectedLat = p.lat; selectedLng = p.lng; selectedName = null;
        showLocStrip(p.lat, p.lng, 'Looking up address…');
        const name = await reverseGeocode(p.lat, p.lng);
        if (name) { selectedName = name; showLocStrip(p.lat, p.lng, name); marker.setPopupContent(name).openPopup(); }
      });
    }

    function showLocStrip(lat, lng, name) {
      document.getElementById('loc-strip').classList.add('visible');
      document.getElementById('loc-name').textContent   = name || 'Pin dropped';
      document.getElementById('loc-coords').textContent = lat.toFixed(5) + ', ' + lng.toFixed(5);
      document.getElementById('save-hint').textContent  = 'Name required · Location saved ✓';
    }

    function clearPin() {
      if (marker) { map.removeLayer(marker); marker = null; }
      selectedLat = selectedLng = selectedName = null;
      document.getElementById('loc-strip').classList.remove('visible');
      document.getElementById('save-hint').textContent = 'Name required · Location optional';
    }

    async function reverseGeocode(lat, lng) {
      try {
        const r = await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lng}&format=json`, { headers: { 'Accept-Language': 'en', 'User-Agent': 'ShopRemind/1.0' } });
        const d = await r.json();
        return d.display_name ? d.display_name.split(',').slice(0,2).join(', ') : null;
      } catch { return null; }
    }

    async function doSearch() {
      const q = document.getElementById('search-input').value.trim();
      if (!q) return;
      const spinner   = document.getElementById('search-spinner');
      const resultsEl = document.getElementById('search-results');
      spinner.classList.add('visible');
      resultsEl.classList.remove('visible');
      resultsEl.innerHTML = '';
      try {
        const query = q.toLowerCase().includes('canada') || q.toLowerCase().includes('ontario') ? q : q + ', Canada';
        const res   = await fetch(`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(query)}&format=json&limit=6&addressdetails=1`, { headers: { 'Accept-Language': 'en', 'User-Agent': 'ShopRemind/1.0' } });
        const data  = await res.json();
        spinner.classList.remove('visible');
        if (!data.length) {
          resultsEl.innerHTML = '<div class="result-item"><div class="result-name" style="color:var(--muted)">No results — try adding your city name</div></div>';
          resultsEl.classList.add('visible'); return;
        }
        data.forEach(place => {
          const div   = document.createElement('div');
          div.className = 'result-item';
          const parts = place.display_name.split(',');
          const sName = parts.slice(0,2).join(', ').trim();
          const addr  = parts.slice(2,5).join(', ').trim();
          div.innerHTML = `<div class="result-name">${escHtml(sName)}</div>${addr?`<div class="result-addr">${escHtml(addr)}</div>`:''}`;
          div.addEventListener('click', () => {
            const lat = parseFloat(place.lat), lng = parseFloat(place.lon);
            selectedLat = lat; selectedLng = lng; selectedName = sName;
            map.setView([lat,lng], 17);
            document.getElementById('map-hint').classList.add('hidden');
            placeMarker(lat, lng, sName);
            showLocStrip(lat, lng, sName);
            resultsEl.classList.remove('visible');
            document.getElementById('search-input').value = '';
          });
          resultsEl.appendChild(div);
        });
        resultsEl.classList.add('visible');
      } catch {
        spinner.classList.remove('visible');
        resultsEl.innerHTML = '<div class="result-item"><div class="result-name" style="color:var(--danger)">Search failed — check your connection</div></div>';
        resultsEl.classList.add('visible');
      }
    }

    function useMyLocation() {
      if (!navigator.geolocation) { alert('Geolocation not supported.'); return; }
      const label = document.getElementById('gps-label');
      label.textContent = 'Getting location…';
      navigator.geolocation.getCurrentPosition(async pos => {
        const lat = pos.coords.latitude, lng = pos.coords.longitude;
        selectedLat = lat; selectedLng = lng;
        map.setView([lat,lng], 17);
        document.getElementById('map-hint').classList.add('hidden');
        placeMarker(lat, lng, 'Your location');
        showLocStrip(lat, lng, 'Your current location');
        label.textContent = 'Use my current location';
        const name = await reverseGeocode(lat, lng);
        if (name) { selectedName = name; showLocStrip(lat, lng, name); if (marker) marker.setPopupContent(name).openPopup(); }
      }, () => { alert('Could not get location. Check permissions.'); label.textContent = 'Use my current location'; },
      { enableHighAccuracy: true, timeout: 10000 });
    }

    function saveStore() {
      const name = document.getElementById('input-name').value.trim();
      if (!name) {
        document.getElementById('input-name').focus();
        document.getElementById('input-name').style.borderColor = 'var(--danger)';
        setTimeout(() => document.getElementById('input-name').style.borderColor = '', 1500);
        return;
      }
      const radius = parseInt(document.getElementById('input-radius').value);
      if (editId) {
        const idx = stores.findIndex(s => s.id === editId);
        if (idx >= 0) Object.assign(stores[idx], { name, emoji: selectedEmoji, radius, lat: selectedLat, lng: selectedLng, locName: selectedName });
      } else {
        stores.push({ id: Date.now().toString(36)+Math.random().toString(36).slice(2,5), name, emoji: selectedEmoji, radius, items: [], lat: selectedLat, lng: selectedLng, locName: selectedName });
      }
      localStorage.setItem('shopremind_stores', JSON.stringify(stores));
      window.location.href = 'index.html';
    }

    function escHtml(s) {
      return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    setTimeout(() => map.invalidateSize(), 300);
  </script>
</body>
</html>
