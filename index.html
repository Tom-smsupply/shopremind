<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ShopRemind</title>
  <link rel="icon" href="shopremindlogo-192.png" />
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="style.css" />
</head>
<body style="padding-bottom:7rem">

  <header>
    <div class="logo">
      <img src="shopremindlogo-192.png" alt="ShopRemind" />
      <span class="logo-text">Shop<span>Remind</span></span>
    </div>
    <button class="btn-icon" onclick="openSettings()" title="Settings">
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
        <circle cx="9" cy="9" r="2.5" stroke="currentColor" stroke-width="1.5"/>
        <path d="M9 1v2M9 15v2M1 9h2M15 9h2M3.1 3.1l1.4 1.4M13.5 13.5l1.4 1.4M13.5 4.5l1.4-1.4M3.1 14.9l1.4-1.4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
    </button>
  </header>

  <!-- Location permission notice -->
  <div id="perm-notice" class="notice-banner warn">
    <svg width="20" height="20" viewBox="0 0 16 16" fill="none" style="flex-shrink:0">
      <circle cx="8" cy="8" r="7" stroke="currentColor" stroke-width="1.5"/>
      <path d="M8 5v3.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
      <circle cx="8" cy="11.5" r="0.75" fill="currentColor"/>
    </svg>
    <div>
      Location access needed for store reminders.
      <span class="notice-link" onclick="requestLocation()">Enable location access →</span>
    </div>
  </div>

  <!-- GPS status bar -->
  <div id="status-bar" class="status-bar" style="margin-top:0.75rem">
    <div class="status-dot"></div>
    <span id="status-text">Starting location…</span>
  </div>

  <!-- Notification permission banner -->
  <button id="notif-notice" onclick="requestNotifPermission()" style="display:none;width:calc(100% - 2.5rem);margin:0.75rem 1.25rem 0;padding:14px 16px;background:rgba(245,158,11,0.08);border:1.5px solid rgba(245,158,11,0.3);border-radius:16px;font-size:14px;color:#92610A;gap:12px;align-items:center;line-height:1.5;cursor:pointer;text-align:left;font-family:'DM Sans',sans-serif;box-shadow:0 2px 12px rgba(27,42,107,0.08);">
    <svg width="20" height="20" viewBox="0 0 16 16" fill="none" style="flex-shrink:0">
      <path d="M8 1a5 5 0 0 1 5 5c0 3-1.5 5-1.5 5H3.5S2 9 2 6a6 6 0 0 1 6-5z" stroke="currentColor" stroke-width="1.5"/>
      <path d="M6.5 13a1.5 1.5 0 0 0 3 0" stroke="currentColor" stroke-width="1.5"/>
    </svg>
    <div style="flex:1">
      <strong style="display:block;margin-bottom:2px;font-size:15px">Tap to enable notifications</strong>
      <span style="opacity:0.8">Get alerted when you arrive at a store</span>
    </div>
    <svg width="18" height="18" viewBox="0 0 16 16" fill="none" style="flex-shrink:0;opacity:0.5">
      <path d="M6 3l5 5-5 5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </button>

  <!-- Section header -->
  <div class="section-header">
    <span class="section-title">My stores</span>
    <span class="count-badge" id="store-count">0 stores</span>
  </div>

  <div class="cards-grid" id="cards-grid"></div>

  <div id="empty-state" class="empty-state">
    <div class="empty-icon">🛒</div>
    <div class="empty-title">No store lists yet</div>
    <div class="empty-sub">Tap the <strong style="color:var(--accent)">+</strong> button below to add your first store.</div>
  </div>

  <button class="fab" onclick="window.location.href='addstore.html'" title="Add store">
    <svg width="26" height="26" viewBox="0 0 26 26" fill="none">
      <path d="M13 4v18M4 13h18" stroke="#fff" stroke-width="2.5" stroke-linecap="round"/>
    </svg>
  </button>

  <!-- Settings Modal -->
  <div class="modal-bg" id="modal-settings">
    <div class="modal">
      <div class="modal-handle"></div>
      <div class="modal-title">Settings</div>
      <div class="field">
        <label>Check interval</label>
        <select id="setting-interval">
          <option value="15000">Every 15 seconds</option>
          <option value="30000" selected>Every 30 seconds</option>
          <option value="60000">Every minute</option>
          <option value="120000">Every 2 minutes</option>
        </select>
      </div>
      <div class="field">
        <label>Notifications</label>
        <select id="setting-notif">
          <option value="on" selected>Enabled</option>
          <option value="off">Disabled</option>
        </select>
      </div>
      <p style="font-size:13px;color:var(--muted);line-height:1.6;margin-top:.5rem">
        Keep this page open or install as a PWA for background reminders.
      </p>
      <div class="btn-row">
        <button class="btn-secondary" onclick="closeSettingsModal()">Close</button>
        <button class="btn-primary" onclick="saveSettings()">Save</button>
      </div>
    </div>
  </div>

  <script>
    let stores   = JSON.parse(localStorage.getItem('shopremind_stores')   || '[]');
    let settings = JSON.parse(localStorage.getItem('shopremind_settings') || '{"interval":30000,"notif":"on"}');
    let watchId  = null;
    let userLat  = null, userLng = null;

    function render() {
      const grid = document.getElementById('cards-grid');
      const empty = document.getElementById('empty-state');
      document.getElementById('store-count').textContent = stores.length + ' store' + (stores.length !== 1 ? 's' : '');
      grid.innerHTML = '';
      if (stores.length === 0) { empty.classList.add('visible'); return; }
      empty.classList.remove('visible');
      stores.forEach(store => {
        const nearby  = isNearby(store);
        const total   = (store.items || []).length;
        const checked = (store.items || []).filter(i => i.done).length;
        const preview = (store.items || []).slice(0, 4);
        const more    = total - 4;
        const card    = document.createElement('div');
        card.className = 'store-card' + (nearby ? ' nearby' : '');

        // Build logo — use saved logo URL, or emoji fallback
        const logoHtml = store.logoUrl
          ? `<img src="${escHtml(store.logoUrl)}" alt="" style="width:42px;height:42px;border-radius:10px;object-fit:contain;border:1px solid var(--border);background:#fff;padding:4px;" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"  /><div class="store-emoji" style="display:none">${store.emoji||'🛒'}</div>`
          : `<div class="store-emoji">${store.emoji||'🛒'}</div>`;

        card.innerHTML = `
          <div style="padding:14px 16px 10px">
            <div class="store-name" style="white-space:normal;word-break:break-word;margin-bottom:8px;font-size:18px">${escHtml(store.name)}</div>
            <div style="display:flex;align-items:center;gap:10px">
              ${logoHtml}
              <div style="flex:1;min-width:0">
                <div class="store-meta">
                  <span>${total} item${total !== 1 ? 's' : ''}</span>
                  ${total > 0 ? `<span class="sep">·</span><span>${checked} checked</span>` : ''}
                  ${store.lat ? `<span class="sep">·</span><span style="color:var(--accent-dk)">📍 set</span>` : `<span class="sep">·</span><span style="color:var(--warn)">no location</span>`}
                </div>
                <span class="nearby-pill">● Nearby</span>
              </div>
              <div class="card-actions">
                <button class="btn-sm" onclick="event.stopPropagation();window.location.href='addstore.html?id=${store.id}'">Edit</button>
                <button class="btn-sm danger" onclick="event.stopPropagation();deleteStore('${store.id}')">✕</button>
              </div>
            </div>
          </div>
          ${total > 0 ? `<div class="card-items">
            ${preview.map(i => `<span class="item-chip${i.done?' checked':''}">${escHtml(i.text)}</span>`).join('')}
            ${more > 0 ? `<span class="items-more">+${more} more</span>` : ''}
          </div>` : ''}`;
        card.addEventListener('click', () => window.location.href = `edit.html?id=${store.id}`);
        grid.appendChild(card);

        // Auto-fetch logo if not already saved
        if (!store.logoUrl) fetchLogo(store);
      });
    }

    // ── Auto logo lookup ──────────────────────────────
    // Maps common store name keywords to their domain
    const STORE_DOMAINS = {
      'home depot': 'homedepot.com',
      'walmart': 'walmart.com',
      'costco': 'costco.com',
      'canadian tire': 'canadiantire.ca',
      'loblaws': 'loblaws.ca',
      'sobeys': 'sobeys.com',
      'metro': 'metro.ca',
      'shoppers': 'shoppersdrugmart.ca',
      'shoppers drug mart': 'shoppersdrugmart.ca',
      'rona': 'rona.ca',
      'dollarama': 'dollarama.com',
      'ikea': 'ikea.com',
      'amazon': 'amazon.ca',
      'best buy': 'bestbuy.ca',
      'tim hortons': 'timhortons.com',
      'mcdonald': 'mcdonalds.com',
      'staples': 'staples.ca',
      'sport chek': 'sportchek.ca',
      'marks': 'marks.com',
      'winners': 'winners.ca',
      'homesense': 'homesense.ca',
      'petsmart': 'petsmart.com',
      'petco': 'petco.com',
      'whole foods': 'wholefoodsmarket.com',
      'target': 'target.com',
      'safeway': 'safeway.com',
      'no frills': 'nofrills.ca',
      'food basics': 'foodbasics.ca',
      'freshco': 'freshco.com',
      'zehrs': 'zehrs.ca',
      'giant tiger': 'gianttiger.com',
      'lcbo': 'lcbo.com',
      'beer store': 'thebeerstore.ca',
    };

    async function fetchLogo(store) {
      const nameLower = store.name.toLowerCase();

      // Check our known domain list first
      let domain = null;
      for (const [keyword, d] of Object.entries(STORE_DOMAINS)) {
        if (nameLower.includes(keyword)) { domain = d; break; }
      }

      // If not found, try to guess domain from first word of store name
      if (!domain) {
        const firstWord = nameLower.replace(/[^a-z0-9\s]/g,'').trim().split(/\s+/)[0];
        if (firstWord && firstWord.length > 2) domain = firstWord + '.com';
      }

      if (!domain) return;

      const logoUrl = `https://logo.clearbit.com/${domain}?size=128`;

      // Test the logo loads before saving
      const img = new Image();
      img.onload = () => {
        // Save logo URL to store data
        const idx = stores.findIndex(s => s.id === store.id);
        if (idx >= 0) {
          stores[idx].logoUrl = logoUrl;
          localStorage.setItem('shopremind_stores', JSON.stringify(stores));
          render(); // Re-render with logo
        }
      };
      img.onerror = () => {}; // Logo not found — stay with emoji
      img.src = logoUrl;
    }

    function escHtml(s) {
      return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function requestLocation() {
      navigator.geolocation.getCurrentPosition(pos => {
        userLat = pos.coords.latitude; userLng = pos.coords.longitude;
        document.getElementById('perm-notice').classList.remove('visible');
        startWatcher();
      }, () => setStatus('error', 'Location denied.'));
    }

    function startWatcher() {
      if (watchId) navigator.geolocation.clearWatch(watchId);
      watchId = navigator.geolocation.watchPosition(pos => {
        userLat = pos.coords.latitude; userLng = pos.coords.longitude;
        setStatus('active', `Watching · ${userLat.toFixed(4)}, ${userLng.toFixed(4)}`);
        checkProximity(); pingServiceWorker(); render();
      }, () => setStatus('error', 'Location error. Check permissions.'),
      { enableHighAccuracy: true, maximumAge: 15000 });
    }

    function setStatus(state, text) {
      const bar = document.getElementById('status-bar');
      bar.className = 'status-bar' + (state === 'active' ? ' active' : state === 'error' ? ' error' : '');
      document.getElementById('status-text').textContent = text;
    }

    function distMeters(lat1, lng1, lat2, lng2) {
      const R = 6371000;
      const dLat = (lat2-lat1)*Math.PI/180, dLng = (lng2-lng1)*Math.PI/180;
      const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)**2;
      return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    }

    function isNearby(store) {
      if (!store.lat || userLat === null) return false;
      return distMeters(userLat, userLng, store.lat, store.lng) <= (store.radius || 200);
    }

    const notified = new Set();
    function checkProximity() {
      if (settings.notif !== 'on') return;
      stores.forEach(store => {
        if (!store.lat) return;
        const key = store.id + '_' + Math.floor(Date.now() / 600000);
        if (distMeters(userLat, userLng, store.lat, store.lng) <= (store.radius || 200) && !notified.has(key)) {
          notified.add(key); fireNotification(store);
        }
      });
    }

    function fireNotification(store) {
      if (!('Notification' in window) || Notification.permission !== 'granted') return;
      const remaining = (store.items || []).filter(i => !i.done).length;
      const total     = (store.items || []).length;
      new Notification(`📍 You're near ${store.name}!`, {
        body: remaining > 0 ? `${remaining} item${remaining!==1?'s':''} left on your list.` : 'You have a list for this store.',
        icon: 'shopremindlogo-192.png', tag: store.id
      });
    }

    function pingServiceWorker() {
      if (navigator.serviceWorker && navigator.serviceWorker.controller)
        navigator.serviceWorker.controller.postMessage({ type: 'CHECK_PROXIMITY', stores, userLat, userLng });
    }

    function checkNotifPermission() {
      if (!('Notification' in window)) return;
      document.getElementById('notif-notice').style.display =
        Notification.permission === 'default' ? 'flex' : 'none';
    }

    function requestNotifPermission() {
      if (!('Notification' in window)) return;
      if (Notification.permission === 'denied') {
        alert('Notifications are blocked. Tap the lock icon in the Chrome address bar → Site settings → Notifications → Allow.');
        return;
      }
      Notification.requestPermission(result => {
        if (result === 'granted') {
          document.getElementById('notif-notice').style.display = 'none';
          new Notification('ShopRemind notifications on!', { body: 'You\'ll be alerted when you arrive at a store.', icon: 'shopremindlogo-192.png' });
        }
      });
    }

    function deleteStore(id) {
      if (!confirm('Remove this store and its list?')) return;
      stores = stores.filter(s => s.id !== id);
      localStorage.setItem('shopremind_stores', JSON.stringify(stores));
      render();
    }

    function openSettings() {
      document.getElementById('setting-interval').value = settings.interval;
      document.getElementById('setting-notif').value    = settings.notif;
      document.getElementById('modal-settings').classList.add('open');
    }
    function closeSettingsModal() { document.getElementById('modal-settings').classList.remove('open'); }
    function saveSettings() {
      settings.interval = parseInt(document.getElementById('setting-interval').value);
      settings.notif    = document.getElementById('setting-notif').value;
      localStorage.setItem('shopremind_settings', JSON.stringify(settings));
      closeSettingsModal();
    }
    document.getElementById('modal-settings').addEventListener('click', e => {
      if (e.target === document.getElementById('modal-settings')) closeSettingsModal();
    });

    window.addEventListener('pageshow', () => {
      stores   = JSON.parse(localStorage.getItem('shopremind_stores')   || '[]');
      settings = JSON.parse(localStorage.getItem('shopremind_settings') || '{"interval":30000,"notif":"on"}');
      render(); checkNotifPermission();
    });

    (function init() {
      render(); checkNotifPermission();
      if (!navigator.geolocation) { setStatus('error', 'Geolocation not supported.'); return; }
      const tryStart = () => navigator.geolocation.getCurrentPosition(
        pos => { userLat = pos.coords.latitude; userLng = pos.coords.longitude;
          document.getElementById('perm-notice').classList.remove('visible'); startWatcher(); },
        err => { if (err.code === 1) {
          document.getElementById('perm-notice').classList.add('visible');
          setStatus('error', 'Location blocked. Tap "Enable location access" above.');
        } else startWatcher(); },
        { enableHighAccuracy: false, timeout: 5000, maximumAge: 30000 }
      );
      if (navigator.permissions) {
        navigator.permissions.query({ name: 'geolocation' }).then(r => {
          if (r.state === 'denied') {
            document.getElementById('perm-notice').classList.add('visible');
            setStatus('error', 'Location blocked.');
          } else tryStart();
          r.onchange = () => {
            if (r.state === 'granted') { document.getElementById('perm-notice').classList.remove('visible'); startWatcher(); }
            else if (r.state === 'denied') { document.getElementById('perm-notice').classList.add('visible'); setStatus('error', 'Location blocked.'); }
          };
        }).catch(() => tryStart());
      } else tryStart();
      if ('serviceWorker' in navigator)
        navigator.serviceWorker.register('/service-worker.js').catch(e => console.log('SW:', e));
    })();
  </script>
</body>
</html>
