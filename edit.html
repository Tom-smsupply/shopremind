<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ShopRemind — List</title>
  <link rel="icon" href="shopremindlogo-192.png" />
  <link rel="stylesheet" href="style.css" />
</head>
<body style="padding-bottom:7rem">

  <header>
    <a class="btn-back" id="btn-back" href="index.html">
      <svg width="18" height="18" viewBox="0 0 16 16" fill="none">
        <path d="M10 3L5 8l5 5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </a>
    <div style="flex:1;min-width:0;display:flex;align-items:center;gap:10px;margin:0 10px">
      <span id="hdr-emoji" style="font-size:26px;flex-shrink:0">🛒</span>
      <span id="hdr-name" style="font-size:18px;font-weight:700;color:var(--navy);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">Store</span>
    </div>
    <button class="btn-icon" id="btn-loc" onclick="goToLocation()" title="Set location" style="flex-shrink:0;gap:6px;width:auto;padding:0 12px;font-size:13px;font-weight:600;font-family:'DM Sans',sans-serif;color:var(--muted)">
      <svg width="15" height="15" viewBox="0 0 16 16" fill="none">
        <path d="M8 1.5C5.5 1.5 3.5 3.5 3.5 6C3.5 9.5 8 14.5 8 14.5S12.5 9.5 12.5 6C12.5 3.5 10.5 1.5 8 1.5Z" stroke="currentColor" stroke-width="1.5" fill="none"/>
        <circle cx="8" cy="6" r="1.75" stroke="currentColor" stroke-width="1.5"/>
      </svg>
      <span id="btn-loc-label">Set location</span>
    </button>
  </header>

  <!-- Progress -->
  <div class="progress-wrap">
    <div class="progress-row">
      <span class="progress-label">Progress</span>
      <span class="progress-frac" id="progress-frac">0 / 0</span>
    </div>
    <div class="progress-track">
      <div class="progress-fill" id="progress-fill" style="width:0%"></div>
    </div>
  </div>

  <!-- Location strip -->
  <div id="loc-strip" class="loc-strip">
    <svg width="15" height="15" viewBox="0 0 16 16" fill="none" style="flex-shrink:0">
      <path d="M8 1.5C5.5 1.5 3.5 3.5 3.5 6C3.5 9.5 8 14.5 8 14.5S12.5 9.5 12.5 6C12.5 3.5 10.5 1.5 8 1.5Z" stroke="currentColor" stroke-width="1.5" fill="none"/>
      <circle cx="8" cy="6" r="1.75" stroke="currentColor" stroke-width="1.5"/>
    </svg>
    <span id="loc-strip-text" style="flex:1;font-weight:500">Location set</span>
    <button class="btn-clear-loc" onclick="clearLocation()">Clear</button>
  </div>

  <!-- Add item bar -->
  <div class="add-bar">
    <input class="add-input" id="add-input" type="text" placeholder="Add an item…" autocomplete="off"
           onkeydown="if(event.key==='Enter') addItem()" />
    <button class="btn-voice" id="btn-voice" onclick="toggleVoice()" title="Voice input">
      <svg id="voice-icon" width="20" height="20" viewBox="0 0 18 18" fill="none">
        <rect x="6" y="1" width="6" height="10" rx="3" stroke="currentColor" stroke-width="1.5"/>
        <path d="M3 9a6 6 0 0 0 12 0" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        <line x1="9" y1="15" x2="9" y2="17" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
    </button>
    <button class="btn-add" onclick="addItem()">
      <svg width="20" height="20" viewBox="0 0 18 18" fill="none">
        <path d="M9 3v12M3 9h12" stroke="#fff" stroke-width="2.2" stroke-linecap="round"/>
      </svg>
    </button>
  </div>

  <!-- Voice status -->
  <div id="voice-status" style="display:none;padding:7px 1.25rem;font-size:13px;font-family:'DM Mono',monospace;color:var(--accent-dk);align-items:center;gap:8px;">
    <span style="width:8px;height:8px;border-radius:50%;background:var(--accent);animation:pulse 1s infinite;flex-shrink:0;display:inline-block"></span>
    <span id="voice-text">Listening…</span>
  </div>

  <!-- Filter pills -->
  <div class="filter-bar">
    <button class="filter-btn active" onclick="setFilter('all', this)">All</button>
    <button class="filter-btn" onclick="setFilter('todo', this)">To get</button>
    <button class="filter-btn" onclick="setFilter('done', this)">Got it</button>
  </div>

  <!-- Todo section -->
  <div class="section-header" id="todo-header" style="display:none">
    <span class="section-title">To get</span>
  </div>
  <div class="items-list" id="list-todo"></div>

  <!-- Done section -->
  <div class="section-header" id="done-header" style="display:none">
    <span class="section-title">Got it</span>
    <button style="font-size:13px;color:var(--muted);background:none;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;padding:4px 8px;border-radius:8px;" onclick="clearDone()">Remove checked</button>
  </div>
  <div class="items-list" id="list-done"></div>

  <!-- Empty state -->
  <div id="empty-list" class="empty-state" style="padding:2.5rem 2rem">
    <div class="empty-icon">📋</div>
    <div class="empty-title">List is empty</div>
    <div class="empty-sub">Type an item above and tap <strong style="color:var(--accent)">+</strong> to add it.<br>Or tap the mic to use your voice.</div>
  </div>

  <!-- Edit item modal -->
  <div class="modal-bg" id="modal-edit">
    <div class="modal">
      <div class="modal-handle"></div>
      <div class="modal-title">Edit item</div>
      <div class="field">
        <label>Item name</label>
        <input type="text" id="edit-item-name" />
      </div>
      <div class="field">
        <label>Quantity / note (optional)</label>
        <input type="text" id="edit-item-qty" placeholder="e.g. 2, 1 bag, large" />
      </div>
      <div class="btn-row">
        <button class="btn-secondary" onclick="closeEditModal()">Cancel</button>
        <button class="btn-primary" onclick="saveItemEdit()">Save</button>
      </div>
    </div>
  </div>

  <script>
    const params  = new URLSearchParams(location.search);
    const storeId = params.get('id');
    let stores = JSON.parse(localStorage.getItem('shopremind_stores') || '[]');
    let store  = stores.find(s => s.id === storeId);

    if (!store) {
      document.body.innerHTML = '<p style="padding:2rem;color:var(--muted);font-family:sans-serif">Store not found. <a href="index.html" style="color:var(--accent)">Go back \u2192</a></p>';
      throw new Error('Store not found');
    }

    let currentFilter = 'all';
    let editingItemId = null;

    document.getElementById('hdr-emoji').textContent = store.emoji || '🛒';
    document.getElementById('hdr-name').textContent  = store.name;
    document.title = 'ShopRemind \u2014 ' + store.name;

    // Show logo if saved
    if (store.logoUrl) {
      const emojiEl = document.getElementById('hdr-emoji');
      const img = document.createElement('img');
      img.src = store.logoUrl;
      img.style.cssText = 'width:34px;height:34px;border-radius:8px;object-fit:contain;border:1px solid var(--border);background:#fff;padding:3px;flex-shrink:0';
      img.onerror = () => img.replaceWith(emojiEl);
      emojiEl.replaceWith(img);
    }

    updateLocUI();

    function render() {
      const items     = store.items || [];
      const todo      = items.filter(i => !i.done);
      const done      = items.filter(i => i.done);
      const total     = items.length;
      const doneCount = done.length;

      document.getElementById('progress-frac').textContent = doneCount + ' / ' + total;
      document.getElementById('progress-fill').style.width = total > 0 ? (doneCount/total*100) + '%' : '0%';

      const showTodo = currentFilter !== 'done';
      const showDone = currentFilter !== 'todo';
      renderSection('list-todo', todo, showTodo);
      renderSection('list-done', done, showDone);
      document.getElementById('todo-header').style.display = showTodo && todo.length > 0 ? 'flex' : 'none';
      document.getElementById('done-header').style.display = showDone && done.length > 0 ? 'flex' : 'none';
      document.getElementById('empty-list').classList.toggle('visible', total === 0);
    }

    function renderSection(listId, items, show) {
      const el = document.getElementById(listId);
      el.innerHTML = '';
      if (!show) return;
      items.forEach(item => {
        const row = document.createElement('div');
        row.className = 'item-row' + (item.done ? ' done' : '');
        row.innerHTML = `
          <div class="item-check" title="${item.done ? 'Uncheck' : 'Check off'}">
            ${item.done ? `<svg width="15" height="15" viewBox="0 0 14 14" fill="none"><path d="M2 7l3.5 3.5 6.5-6.5" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>` : ''}
          </div>
          <span class="item-text">${escHtml(item.text)}</span>
          ${item.qty ? `<span class="item-qty">${escHtml(item.qty)}</span>` : ''}
          <button class="btn-delete-item" title="Remove item">
            <svg width="14" height="14" viewBox="0 0 13 13" fill="none">
              <path d="M2 2l9 9M11 2L2 11" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            </svg>
          </button>`;
        row.querySelector('.item-check').addEventListener('click', e => { e.stopPropagation(); toggleItem(item.id); });
        row.querySelector('.btn-delete-item').addEventListener('click', e => { e.stopPropagation(); deleteItem(item.id); });
        row.addEventListener('contextmenu', e => { e.preventDefault(); openEditModal(item.id); });
        el.appendChild(row);
      });
    }

    function escHtml(s) {
      return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function addItem() {
      const input = document.getElementById('add-input');
      const raw   = input.value.trim();
      if (!raw) return;
      let text = raw, qty = '';
      const m1 = raw.match(/^(\d+)[x×]\s*(.+)/i);
      const m2 = raw.match(/^(.+?)\s+[x×](\d+)$/i);
      const m3 = raw.match(/^(.+?)\s+\((.+)\)$/);
      if (m1) { qty = m1[1]; text = m1[2]; }
      else if (m2) { qty = m2[2]; text = m2[1]; }
      else if (m3) { text = m3[1]; qty = m3[2]; }
      store.items = store.items || [];
      store.items.push({ id: Date.now().toString(36)+Math.random().toString(36).slice(2,5), text, qty, done: false });
      persist(); input.value = ''; input.focus(); render();
    }

    function toggleItem(id) {
      const item = (store.items||[]).find(i => i.id === id);
      if (item) { item.done = !item.done; persist(); render(); }
    }

    function deleteItem(id) {
      store.items = (store.items||[]).filter(i => i.id !== id);
      persist(); render();
    }

    function clearDone() {
      if (!confirm('Remove all checked items?')) return;
      store.items = (store.items||[]).filter(i => !i.done);
      persist(); render();
    }

    function openEditModal(id) {
      const item = (store.items||[]).find(i => i.id === id);
      if (!item) return;
      editingItemId = id;
      document.getElementById('edit-item-name').value = item.text;
      document.getElementById('edit-item-qty').value  = item.qty || '';
      document.getElementById('modal-edit').classList.add('open');
      setTimeout(() => document.getElementById('edit-item-name').select(), 80);
    }

    function closeEditModal() { document.getElementById('modal-edit').classList.remove('open'); editingItemId = null; }

    function saveItemEdit() {
      const name = document.getElementById('edit-item-name').value.trim();
      if (!name) return;
      const item = (store.items||[]).find(i => i.id === editingItemId);
      if (item) { item.text = name; item.qty = document.getElementById('edit-item-qty').value.trim(); persist(); render(); }
      closeEditModal();
    }

    function setFilter(f, btn) {
      currentFilter = f;
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.toggle('active', b === btn));
      render();
    }

    function goToLocation() { location.href = 'addstore.html?id=' + storeId; }

    function clearLocation() {
      if (!confirm('Clear the saved location for this store?')) return;
      store.lat = null; store.lng = null; store.locName = null;
      persist(); updateLocUI();
    }

    function updateLocUI() {
      const btn   = document.getElementById('btn-loc');
      const label = document.getElementById('btn-loc-label');
      const strip = document.getElementById('loc-strip');
      if (store.lat) {
        btn.style.color = 'var(--accent-dk)';
        btn.style.borderColor = 'rgba(43,196,212,0.4)';
        label.textContent = 'Update location';
        strip.classList.add('visible');
        document.getElementById('loc-strip-text').textContent = store.locName ? '📍 ' + store.locName : '📍 ' + store.lat.toFixed(5) + ', ' + store.lng.toFixed(5);
      } else {
        btn.style.color = '';
        btn.style.borderColor = '';
        label.textContent = 'Set location';
        strip.classList.remove('visible');
      }
    }

    function persist() {
      const idx = stores.findIndex(s => s.id === storeId);
      if (idx >= 0) stores[idx] = store;
      localStorage.setItem('shopremind_stores', JSON.stringify(stores));
    }

    window.addEventListener('pageshow', () => {
      stores = JSON.parse(localStorage.getItem('shopremind_stores') || '[]');
      store  = stores.find(s => s.id === storeId);
      if (store) { updateLocUI(); render(); }
    });

    document.getElementById('modal-edit').addEventListener('click', e => {
      if (e.target === document.getElementById('modal-edit')) closeEditModal();
    });

    // ── Voice input ───────────────────────────────────
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    let recognition = null, isListening = false;

    if (!SpeechRecognition) {
      document.getElementById('btn-voice').style.display = 'none';
    } else {
      recognition = new SpeechRecognition();
      recognition.continuous = false;
      recognition.interimResults = true;
      recognition.lang = 'en-CA';
      recognition.onstart = () => {
        isListening = true;
        document.getElementById('btn-voice').classList.add('listening');
        const vs = document.getElementById('voice-status');
        vs.style.display = 'flex';
        document.getElementById('voice-text').textContent = 'Listening…';
      };
      recognition.onresult = e => {
        const transcript = Array.from(e.results).map(r => r[0].transcript).join('');
        document.getElementById('add-input').value = transcript;
        document.getElementById('voice-text').textContent = transcript || 'Listening…';
        if (e.results[e.results.length-1].isFinal) {
          document.getElementById('voice-text').textContent = 'Got it: ' + transcript;
          setTimeout(() => { if (document.getElementById('add-input').value.trim()) addItem(); }, 600);
        }
      };
      recognition.onerror = e => {
        const msg = e.error === 'not-allowed' ? 'Microphone blocked' : e.error === 'no-speech' ? 'No speech detected — try again' : 'Error: ' + e.error;
        document.getElementById('voice-text').textContent = msg;
        stopVoice();
      };
      recognition.onend = () => stopVoice();
    }

    function toggleVoice() {
      if (!recognition) return;
      if (isListening) recognition.stop();
      else { document.getElementById('add-input').value = ''; recognition.start(); }
    }

    function stopVoice() {
      isListening = false;
      document.getElementById('btn-voice').classList.remove('listening');
      setTimeout(() => { document.getElementById('voice-status').style.display = 'none'; }, 1500);
    }

    render();
  </script>
</body>
</html>
