<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ShopRemind — List</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0f0f11;
      --surface:  #1a1a1f;
      --surface2: #242429;
      --border:   #2e2e36;
      --accent:   #6ee7b7;
      --accent2:  #fbbf24;
      --text:     #f0eff4;
      --muted:    #8b8a96;
      --danger:   #f87171;
      --radius:   14px;
      --font:     'DM Sans', sans-serif;
      --mono:     'DM Mono', monospace;
    }

    body {
      background: var(--bg);
      background-image:
        radial-gradient(ellipse at 20% 10%, rgba(110,231,183,0.04) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 90%, rgba(110,231,183,0.03) 0%, transparent 50%);
      color: var(--text);
      font-family: var(--font);
      min-height: 100vh;
      padding-bottom: 7rem;
    }

    /* ── Header ── */
    header {
      padding: 1rem 1.25rem;
      display: flex;
      align-items: center;
      gap: 12px;
      position: sticky;
      top: 0;
      background: rgba(15,15,17,0.92);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      z-index: 100;
    }

    .btn-back {
      width: 36px; height: 36px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 9px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: var(--muted);
      text-decoration: none;
      flex-shrink: 0;
      transition: background 0.15s, color 0.15s;
    }
    .btn-back:hover { background: var(--surface2); color: var(--text); }

    .header-store {
      flex: 1;
      min-width: 0;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .store-emoji-sm {
      font-size: 22px;
      flex-shrink: 0;
    }

    .store-name-header {
      font-size: 17px;
      font-weight: 600;
      letter-spacing: -0.3px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .btn-loc {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 0 12px;
      height: 36px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 9px;
      font-size: 12px;
      font-family: var(--font);
      color: var(--muted);
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.15s, border-color 0.15s, color 0.15s;
      flex-shrink: 0;
    }
    .btn-loc:hover { background: var(--surface2); color: var(--text); }
    .btn-loc.set { border-color: var(--accent); color: var(--accent); }

    /* ── Progress bar ── */
    .progress-wrap {
      padding: 1rem 1.25rem 0;
    }

    .progress-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
    }

    .progress-label {
      font-size: 12px;
      font-family: var(--mono);
      color: var(--muted);
    }

    .progress-frac {
      font-size: 12px;
      font-family: var(--mono);
      color: var(--accent);
    }

    .progress-track {
      height: 4px;
      background: var(--surface2);
      border-radius: 2px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: var(--accent);
      border-radius: 2px;
      transition: width 0.3s ease;
    }

    /* ── Add item bar ── */
    .add-bar {
      margin: 1rem 1.25rem 0;
      display: flex;
      gap: 8px;
    }

    .add-input {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 11px 14px;
      font-size: 15px;
      font-family: var(--font);
      color: var(--text);
      outline: none;
      transition: border-color 0.15s;
    }
    .add-input::placeholder { color: var(--muted); }
    .add-input:focus { border-color: var(--accent); }

    .btn-add {
      width: 44px; height: 44px;
      background: var(--accent);
      border: none;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      flex-shrink: 0;
      transition: opacity 0.15s;

    .btn-voice {
      width: 44px; height: 44px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      flex-shrink: 0;
      color: var(--muted);
      transition: background 0.15s, border-color 0.15s, color 0.15s;
    }
    .btn-voice:hover { background: var(--surface2); color: var(--text); }
    .btn-voice.listening {
      background: rgba(248,113,113,0.12);
      border-color: var(--danger);
      color: var(--danger);
      animation: pulse-border 1s infinite;
    }
    @keyframes pulse-border {
      0%, 100% { border-color: var(--danger); }
      50% { border-color: rgba(248,113,113,0.3); }
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }
    }
    .btn-add:hover { opacity: 0.88; }

    /* ── Section label ── */
    .section-header {
      padding: 1.25rem 1.25rem 0.6rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .section-title {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.09em;
      text-transform: uppercase;
      color: var(--muted);
      font-family: var(--mono);
    }

    .btn-clear-done {
      font-size: 11px;
      font-family: var(--mono);
      color: var(--muted);
      background: none;
      border: none;
      cursor: pointer;
      padding: 2px 0;
      transition: color 0.15s;
    }
    .btn-clear-done:hover { color: var(--danger); }

    /* ── List items ── */
    .items-list {
      padding: 0 1.25rem;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .item-row {
      display: flex;
      align-items: center;
      gap: 12px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 11px;
      padding: 10px 10px 10px 14px;
      transition: border-color 0.2s, opacity 0.2s;
      user-select: none;
    }
    .item-row:hover { border-color: #3a3a44; }
    .item-row.done { opacity: 0.55; }
    .item-row.done .item-text { text-decoration: line-through; color: var(--muted); }

    /* Checkbox — big, obvious, tap-friendly */
    .item-check {
      width: 28px; height: 28px;
      border-radius: 8px;
      border: 2px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s, transform 0.1s;
    }
    .item-check:hover { border-color: var(--accent); transform: scale(1.08); }
    .item-row.done .item-check {
      background: var(--accent);
      border-color: var(--accent);
    }

    .item-text {
      flex: 1;
      font-size: 15px;
      line-height: 1.4;
      transition: color 0.2s;
      cursor: default;
    }

    .item-qty {
      font-size: 12px;
      font-family: var(--mono);
      color: var(--muted);
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 2px 8px;
    }

    .btn-delete-item {
      width: 28px; height: 28px;
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 7px;
      transition: background 0.15s, color 0.15s;
      flex-shrink: 0;
    }
    .btn-delete-item:hover { background: rgba(248,113,113,0.1); color: var(--danger); }

    /* ── Empty list ── */
    .empty-list {
      padding: 3rem 2rem;
      text-align: center;
      color: var(--muted);
      display: none;
    }
    .empty-list.visible { display: block; }
    .empty-list-icon { font-size: 40px; margin-bottom: 1rem; opacity: 0.5; }
    .empty-list-text { font-size: 14px; line-height: 1.6; }

    /* ── Location info strip ── */
    #loc-strip {
      margin: 0.75rem 1.25rem 0;
      padding: 10px 14px;
      background: rgba(110,231,183,0.06);
      border: 1px solid rgba(110,231,183,0.2);
      border-radius: var(--radius);
      font-size: 12px;
      color: var(--accent);
      font-family: var(--mono);
      display: none;
      align-items: center;
      gap: 10px;
    }
    #loc-strip.visible { display: flex; }

    .btn-clear-loc {
      margin-left: auto;
      font-size: 11px;
      font-family: var(--mono);
      color: var(--muted);
      background: none;
      border: none;
      cursor: pointer;
      transition: color 0.15s;
    }
    .btn-clear-loc:hover { color: var(--danger); }

    /* ── Qty modal ── */
    .modal-bg {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(4px);
      z-index: 300;
      display: none;
      align-items: flex-end;
      justify-content: center;
    }
    .modal-bg.open { display: flex; }

    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px 20px 0 0;
      width: 100%;
      max-width: 480px;
      padding: 1.5rem 1.25rem 2rem;
      animation: slideUp 0.22s ease;
    }
    @keyframes slideUp {
      from { transform: translateY(40px); opacity: 0; }
      to   { transform: translateY(0); opacity: 1; }
    }

    .modal-handle {
      width: 36px; height: 4px;
      background: var(--border);
      border-radius: 2px;
      margin: 0 auto 1.25rem;
    }

    .modal-title { font-size: 16px; font-weight: 600; margin-bottom: 1rem; }

    .field { margin-bottom: 1rem; }
    .field label {
      display: block;
      font-size: 11px;
      font-family: var(--mono);
      color: var(--muted);
      margin-bottom: 6px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }
    .field input {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 15px;
      font-family: var(--font);
      color: var(--text);
      outline: none;
      transition: border-color 0.15s;
    }
    .field input:focus { border-color: var(--accent); }

    .modal-actions { display: flex; gap: 8px; margin-top: 1rem; }

    .btn-cancel {
      flex: 1; padding: 12px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      font-size: 14px; font-family: var(--font);
      color: var(--muted); cursor: pointer;
    }
    .btn-cancel:hover { color: var(--text); }

    .btn-save {
      flex: 2; padding: 12px;
      background: var(--accent);
      border: none; border-radius: 10px;
      font-size: 14px; font-weight: 600; font-family: var(--font);
      color: #0a1a12; cursor: pointer;
    }
    .btn-save:hover { opacity: 0.9; }

    /* ── Sort/filter bar ── */
    .filter-bar {
      padding: 0.75rem 1.25rem 0;
      display: flex;
      gap: 6px;
    }

    .filter-btn {
      padding: 5px 12px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      font-size: 12px;
      font-family: var(--mono);
      color: var(--muted);
      cursor: pointer;
      transition: background 0.15s, color 0.15s, border-color 0.15s;
    }
    .filter-btn.active { background: rgba(110,231,183,0.1); border-color: var(--accent); color: var(--accent); }
  </style>
</head>
<body>

  <!-- Header -->
  <header>
    <a href="index.html" class="btn-back" title="Back">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
        <path d="M10 3L5 8l5 5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </a>
    <div class="header-store">
      <span class="store-emoji-sm" id="hdr-emoji">🛒</span>
      <span class="store-name-header" id="hdr-name">Store</span>
    </div>
    <button class="btn-loc" id="btn-loc" onclick="goToLocation()">
      <svg width="13" height="13" viewBox="0 0 16 16" fill="none">
        <path d="M8 1.5C5.5 1.5 3.5 3.5 3.5 6C3.5 9.5 8 14.5 8 14.5C8 14.5 12.5 9.5 12.5 6C12.5 3.5 10.5 1.5 8 1.5Z" stroke="currentColor" stroke-width="1.5" fill="none"/>
        <circle cx="8" cy="6" r="1.75" stroke="currentColor" stroke-width="1.5"/>
      </svg>
      <span id="btn-loc-label">Set location</span>
    </button>
  </header>

  <!-- Progress -->
  <div class="progress-wrap">
    <div class="progress-row">
      <span class="progress-label">Progress</span>
      <span class="progress-frac" id="progress-frac">0 / 0</span>
    </div>
    <div class="progress-track">
      <div class="progress-fill" id="progress-fill" style="width:0%"></div>
    </div>
  </div>

  <!-- Location strip -->
  <div id="loc-strip">
    <svg width="13" height="13" viewBox="0 0 16 16" fill="none">
      <path d="M8 1.5C5.5 1.5 3.5 3.5 3.5 6C3.5 9.5 8 14.5 8 14.5C8 14.5 12.5 9.5 12.5 6C12.5 3.5 10.5 1.5 8 1.5Z" stroke="currentColor" stroke-width="1.5" fill="none"/>
      <circle cx="8" cy="6" r="1.75" stroke="currentColor" stroke-width="1.5"/>
    </svg>
    <span id="loc-strip-text">Location set</span>
    <button class="btn-clear-loc" onclick="clearLocation()">Clear</button>
  </div>

  <!-- Add item bar -->
  <div class="add-bar">
    <input class="add-input" id="add-input" type="text" placeholder="Add an item…" autocomplete="off"
           onkeydown="if(event.key==='Enter') addItem()" />
    <button class="btn-voice" id="btn-voice" onclick="toggleVoice()" title="Voice input">
      <svg id="voice-icon" width="18" height="18" viewBox="0 0 18 18" fill="none">
        <rect x="6" y="1" width="6" height="10" rx="3" stroke="currentColor" stroke-width="1.5"/>
        <path d="M3 9a6 6 0 0 0 12 0" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        <line x1="9" y1="15" x2="9" y2="17" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
    </button>
    <button class="btn-add" onclick="addItem()">
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
        <path d="M9 3v12M3 9h12" stroke="#0a1a12" stroke-width="2.2" stroke-linecap="round"/>
      </svg>
    </button>
  </div>
  <!-- Voice status -->
  <div id="voice-status" style="display:none;padding:6px 1.25rem;font-size:12px;font-family:var(--mono);color:var(--accent);display:none;align-items:center;gap:8px;">
    <span id="voice-dot" style="width:8px;height:8px;border-radius:50%;background:var(--accent);animation:pulse 1s infinite;flex-shrink:0"></span>
    <span id="voice-text">Listening…</span>
  </div>

  <!-- Filter pills -->
  <div class="filter-bar">
    <button class="filter-btn active" data-filter="all" onclick="setFilter('all', this)">All</button>
    <button class="filter-btn" data-filter="todo"      onclick="setFilter('todo', this)">To get</button>
    <button class="filter-btn" data-filter="done"      onclick="setFilter('done', this)">Got it</button>
  </div>

  <!-- Todo section -->
  <div class="section-header" id="todo-header">
    <span class="section-title">To get</span>
  </div>
  <div class="items-list" id="list-todo"></div>

  <!-- Done section -->
  <div class="section-header" id="done-header" style="display:none">
    <span class="section-title">Got it</span>
    <button class="btn-clear-done" onclick="clearDone()">Remove checked</button>
  </div>
  <div class="items-list" id="list-done"></div>

  <!-- Empty state -->
  <div class="empty-list" id="empty-list">
    <div class="empty-list-icon">📋</div>
    <div class="empty-list-text">Your list is empty.<br>Type an item above and tap <strong style="color:var(--accent)">+</strong> to add it.</div>
  </div>

  <!-- Edit item modal (long-press / qty) -->
  <div class="modal-bg" id="modal-edit">
    <div class="modal">
      <div class="modal-handle"></div>
      <div class="modal-title" id="edit-modal-title">Edit item</div>
      <div class="field">
        <label>Item name</label>
        <input type="text" id="edit-item-name" />
      </div>
      <div class="field">
        <label>Quantity / note (optional)</label>
        <input type="text" id="edit-item-qty" placeholder="e.g. 2, 1 bag, large" />
      </div>
      <div class="modal-actions">
        <button class="btn-cancel" onclick="closeEditModal()">Cancel</button>
        <button class="btn-save"   onclick="saveItemEdit()">Save</button>
      </div>
    </div>
  </div>

  <script>
    // ── Load store ────────────────────────────────────
    const params = new URLSearchParams(location.search);
    const storeId = params.get('id');
    let stores = JSON.parse(localStorage.getItem('shopremind_stores') || '[]');
    let store = stores.find(s => s.id === storeId);

    if (!store) {
      document.body.innerHTML = '<p style="padding:2rem;color:#8b8a96;font-family:sans-serif">Store not found. <a href="index.html" style="color:#6ee7b7">Go back \u2192</a></p>';
      throw new Error('Store not found');
    }

    let currentFilter = 'all';
    let editingItemId = null;

    // ── Hydrate header ────────────────────────────────
    document.getElementById('hdr-emoji').textContent = store.emoji || '\uD83D\uDED2';
    document.getElementById('hdr-name').textContent  = store.name;
    document.title = 'ShopRemind \u2014 ' + store.name;
    updateLocUI();

    // ── Render ────────────────────────────────────────
    function render() {
      const items   = store.items || [];
      const todo    = items.filter(i => !i.done);
      const done    = items.filter(i => i.done);
      const total   = items.length;
      const doneCount = done.length;

      // Progress
      document.getElementById('progress-frac').textContent = `${doneCount} / ${total}`;
      document.getElementById('progress-fill').style.width = total > 0 ? (doneCount / total * 100) + '%' : '0%';

      // Sections
      const showTodo = currentFilter !== 'done';
      const showDone = currentFilter !== 'todo';

      renderSection('list-todo', todo, showTodo);
      renderSection('list-done', done, showDone);

      document.getElementById('todo-header').style.display = showTodo && todo.length > 0 ? 'flex' : 'none';
      document.getElementById('done-header').style.display = showDone && done.length > 0 ? 'flex' : 'none';
      document.getElementById('empty-list').classList.toggle('visible', total === 0);
    }

    function renderSection(listId, items, show) {
      const el = document.getElementById(listId);
      el.innerHTML = '';
      if (!show) return;
      items.forEach(item => {
        const row = document.createElement('div');
        row.className = 'item-row' + (item.done ? ' done' : '');
        row.innerHTML = `
          <div class="item-check" title="${item.done ? 'Uncheck' : 'Check off'}">
            ${item.done ? `<svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M2 7l3.5 3.5 6.5-6.5" stroke="#0a1a12" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>` : ''}
          </div>
          <span class="item-text" title="Long-press to edit">${escHtml(item.text)}</span>
          ${item.qty ? `<span class="item-qty">${escHtml(item.qty)}</span>` : ''}
          <button class="btn-delete-item" title="Remove item">
            <svg width="13" height="13" viewBox="0 0 13 13" fill="none">
              <path d="M2 2l9 9M11 2L2 11" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            </svg>
          </button>
        `;
        // Only the checkbox toggles done state
        row.querySelector('.item-check').addEventListener('click', e => {
          e.stopPropagation();
          toggleItem(item.id);
        });
        // Delete button removes the item
        row.querySelector('.btn-delete-item').addEventListener('click', e => {
          e.stopPropagation();
          deleteItem(item.id);
        });
        // Right-click or long-press opens edit modal
        row.addEventListener('contextmenu', e => { e.preventDefault(); openEditModal(item.id); });
        el.appendChild(row);
      });
    }

    function escHtml(s) {
      return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    // ── Add item ──────────────────────────────────────
    function addItem() {
      const input = document.getElementById('add-input');
      const raw   = input.value.trim();
      if (!raw) return;

      // Allow "2x milk" or "milk x2" or "milk (2)" style quantity parsing
      let text = raw, qty = '';
      const m1 = raw.match(/^(\d+)[x×]\s*(.+)/i);
      const m2 = raw.match(/^(.+?)\s+[x×](\d+)$/i);
      const m3 = raw.match(/^(.+?)\s+\((.+)\)$/);
      if (m1) { qty = m1[1]; text = m1[2]; }
      else if (m2) { qty = m2[2]; text = m2[1]; }
      else if (m3) { text = m3[1]; qty = m3[2]; }

      store.items = store.items || [];
      store.items.push({ id: Date.now().toString(36) + Math.random().toString(36).slice(2,5), text, qty, done: false });
      persist();
      input.value = '';
      input.focus();
      render();
    }

    // ── Toggle done ───────────────────────────────────
    function toggleItem(id) {
      const item = (store.items || []).find(i => i.id === id);
      if (item) { item.done = !item.done; persist(); render(); }
    }

    // ── Delete item ───────────────────────────────────
    function deleteItem(id) {
      store.items = (store.items || []).filter(i => i.id !== id);
      persist();
      render();
    }

    // ── Clear done ────────────────────────────────────
    function clearDone() {
      if (!confirm('Remove all checked items?')) return;
      store.items = (store.items || []).filter(i => !i.done);
      persist();
      render();
    }

    // ── Edit item modal ───────────────────────────────
    function openEditModal(id) {
      const item = (store.items || []).find(i => i.id === id);
      if (!item) return;
      editingItemId = id;
      document.getElementById('edit-modal-title').textContent = 'Edit item';
      document.getElementById('edit-item-name').value = item.text;
      document.getElementById('edit-item-qty').value  = item.qty || '';
      document.getElementById('modal-edit').classList.add('open');
      setTimeout(() => document.getElementById('edit-item-name').select(), 80);
    }

    function closeEditModal() {
      document.getElementById('modal-edit').classList.remove('open');
      editingItemId = null;
    }

    function saveItemEdit() {
      const name = document.getElementById('edit-item-name').value.trim();
      if (!name) return;
      const item = (store.items || []).find(i => i.id === editingItemId);
      if (item) {
        item.text = name;
        item.qty  = document.getElementById('edit-item-qty').value.trim();
        persist();
        render();
      }
      closeEditModal();
    }

    // ── Filter ────────────────────────────────────────
    function setFilter(f, btn) {
      currentFilter = f;
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.toggle('active', b === btn));
      render();
    }

    // ── Location ──────────────────────────────────────
    function goToLocation() {
      location.href = `addstore.html?id=${storeId}`;
    }

    function clearLocation() {
      if (!confirm('Clear the saved location for this store?')) return;
      store.lat = null;
      store.lng = null;
      store.locName = null;
      persist();
      updateLocUI();
    }

    function updateLocUI() {
      const btn   = document.getElementById('btn-loc');
      const label = document.getElementById('btn-loc-label');
      const strip = document.getElementById('loc-strip');
      const stripText = document.getElementById('loc-strip-text');

      if (store.lat) {
        btn.classList.add('set');
        label.textContent = 'Update location';
        strip.classList.add('visible');
        stripText.textContent = store.locName
          ? `📍 ${store.locName}`
          : `📍 ${store.lat.toFixed(5)}, ${store.lng.toFixed(5)}`;
      } else {
        btn.classList.remove('set');
        label.textContent = 'Set location';
        strip.classList.remove('visible');
      }
    }

    // ── Persist ───────────────────────────────────────
    function persist() {
      const idx = stores.findIndex(s => s.id === storeId);
      if (idx >= 0) stores[idx] = store;
      localStorage.setItem('shopremind_stores', JSON.stringify(stores));
    }

    // ── Reload data when navigating back ─────────────
    window.addEventListener('pageshow', () => {
      stores = JSON.parse(localStorage.getItem('shopremind_stores') || '[]');
      store  = stores.find(s => s.id === storeId);
      if (store) { updateLocUI(); render(); }
    });

    // ── Voice input ───────────────────────────────────
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    let recognition = null;
    let isListening = false;

    if (!SpeechRecognition) {
      // Hide mic button if not supported
      document.getElementById('btn-voice').style.display = 'none';
    } else {
      recognition = new SpeechRecognition();
      recognition.continuous    = false;
      recognition.interimResults = true;
      recognition.lang          = 'en-CA';
      recognition.maxAlternatives = 1;

      recognition.onstart = () => {
        isListening = true;
        document.getElementById('btn-voice').classList.add('listening');
        const vs = document.getElementById('voice-status');
        vs.style.display = 'flex';
        document.getElementById('voice-text').textContent = 'Listening…';
      };

      recognition.onresult = e => {
        const transcript = Array.from(e.results)
          .map(r => r[0].transcript).join('');
        document.getElementById('add-input').value = transcript;
        document.getElementById('voice-text').textContent = transcript || 'Listening…';

        // If final result, auto-add after short pause
        if (e.results[e.results.length - 1].isFinal) {
          document.getElementById('voice-text').textContent = 'Got it: ' + transcript;
          setTimeout(() => {
            if (document.getElementById('add-input').value.trim()) addItem();
          }, 600);
        }
      };

      recognition.onerror = e => {
        const msg = e.error === 'not-allowed'
          ? 'Microphone blocked — check permissions'
          : e.error === 'no-speech'
          ? 'No speech detected — try again'
          : 'Voice error: ' + e.error;
        document.getElementById('voice-text').textContent = msg;
        stopVoice();
      };

      recognition.onend = () => stopVoice();
    }

    function toggleVoice() {
      if (!recognition) return;
      if (isListening) {
        recognition.stop();
      } else {
        document.getElementById('add-input').value = '';
        recognition.start();
      }
    }

    function stopVoice() {
      isListening = false;
      document.getElementById('btn-voice').classList.remove('listening');
      setTimeout(() => {
        document.getElementById('voice-status').style.display = 'none';
      }, 1500);
    }

    // ── Close modal on bg click ───────────────────────
    document.getElementById('modal-edit').addEventListener('click', e => {
      if (e.target === document.getElementById('modal-edit')) closeEditModal();
    });

    // ── Init ─────────────────────────────────────────
    render();
  </script>
</body>
</html>
